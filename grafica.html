<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banco Pokémon - Gráfica</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="./css/grafica.css">
</head>
<body>
    <div class="container pagina-wrapper">
        <div class="caja">
            <div class="header">
                <img src="./img/Pokemon-Logo.png" alt="Logo Banco Pokémon">
                <h1>Bienvenido, <span id="nombreUsuario"></span></h1>
                <p>Número de cuenta: <span id="cuentaUsuario"></span></p>
            </div>

            <div class="menu">
                <aside class="menu-aside">
                    <div class="info-card mb-3">
                        <h4>Vista rápida</h4>
                        <p>Resumen gráfico semanal de depósitos, retiros y pagos.</p>
                    </div>

                    <div class="btn-group-custom">
                        <a href="transacciones.html" class="btn menu-btn transacciones-btn">Transacciones</a>
                        <a href="historial.html" class="btn menu-btn historial-btn">Historial</a>
                        <a href="analisis.html" class="btn menu-btn analisis-btn">Análisis</a>
                        <a href="login.html" class="btn menu-btn cerrar-btn">Cerrar Sesión</a>
                    </div>
                </aside>

                <main class="content">
                    <div class="panel-principal">
                        <h2>Gráfica semanal</h2>
                        <p class="subtitulo">Comparativa general de movimientos de la semana actual.</p>

                        <div class="chart-card">
                            <h4>Resumen semanal</h4>
                            <canvas id="grafico-semanal"></canvas>
                        </div>
                    </div>
                </main>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.2/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</body>
</html>
